<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мультфильм кейіпкерлерін тап</title>
  <style>
    :root {
      --bg1: #fff7ed;
      --bg2: #eff6ff;
      --card: rgba(255, 255, 255, 0.9);
      --text: #1f2937;
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --danger: #ef4444;
      --shadow: 0 14px 35px rgba(31, 41, 55, 0.14);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #fde68a 0%, transparent 28%),
        radial-gradient(circle at top right, #bfdbfe 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .wrap {
      width: min(1200px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      position: relative;
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      background: var(--card);
      box-shadow: var(--shadow);
      border: 2px solid rgba(255,255,255,0.85);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      padding: 0;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(31, 41, 55, 0.18);
    }

    .card.opened {
      border-color: var(--danger);
      box-shadow: 0 18px 40px rgba(239, 68, 68, 0.18);
    }

    .card.closed .front {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
    }

    .card.closed .back {
      opacity: 0;
      visibility: hidden;
      transform: scale(0.96);
    }

    .card.revealed .front {
      opacity: 0;
      visibility: hidden;
      transform: scale(0.96);
    }

    .card.revealed .back {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
    }

    .front,
    .back {
      position: absolute;
      inset: 0;
      transition: 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .front {
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.95), rgba(255,255,255,0) 32%),
        linear-gradient(135deg, #a78bfa, #22d3ee);
      color: white;
    }

    .front::after {
      content: "★";
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 20px;
      opacity: 0.45;
    }

    .number {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(4px);
      font-size: 30px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .back {
      background: white;
    }

    .back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      visibility: hidden;
      transition: 0.25s ease;
      z-index: 1000;
    }

    .modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      position: relative;
      width: min(90vw, 760px);
      aspect-ratio: 1 / 1;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
      transform: scale(0.92);
      transition: 0.25s ease;
    }

    .modal.show .modal-card {
      transform: scale(1);
    }

    .modal-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
      display: block;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.78);
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100% - 18px, 1200px);
      }

      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
    }

    @media (max-width: 460px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="grid" id="grid"></section>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <button class="close-btn" id="closeModalBtn">×</button>
      <img id="modalImg" src="" alt="Үлкен сурет" />
    </div>
  </div>

  <script>
    const totalCards = 18;
    const grid = document.getElementById('grid');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modalImg');
    const closeModalBtn = document.getElementById('closeModalBtn');

    const state = Array.from({ length: totalCards }, (_, i) => ({
      id: i + 1,
      isOpen: false,
      wasOpened: false,
    }));

    function getImagePath(index) {
      return `img/img${index}.jpg`;
      // png болса:
      // return `img/img${index}.png`;
    }


    function openModal(src, id) {
      modalImg.src = src;
      modalImg.alt = `${id}-сурет`;
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
      modalImg.src = '';
    }

    function createCard(item) {
      const btn = document.createElement('button');
      btn.className = 'card closed';
      btn.dataset.id = item.id;
      btn.type = 'button';
      btn.setAttribute('aria-label', `${item.id}-ұяшық`);

      btn.innerHTML = `
        <div class="front">
          <div class="number">${item.id}</div>
        </div>
        <div class="back">
          <img src="${getImagePath(item.id)}" alt="${item.id}-сурет" loading="lazy"
               onerror="this.alt='Сурет табылмады'; this.style.objectFit='contain'; this.style.padding='16px'; this.src='data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"400\" height=\"400\"><rect width=\"100%\" height=\"100%\" fill=\"#fff1f2\"/><text x=\"50%\" y=\"45%\" dominant-baseline=\"middle\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"26\" fill=\"#e11d48\">Сурет жоқ</text><text x=\"50%\" y=\"58%\" dominant-baseline=\"middle\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"18\" fill=\"#64748b\">img/img${item.id}.jpg</text></svg>`) }'">
        </div>
      `;

      btn.addEventListener('click', () => toggleCard(item.id));
      return btn;
    }

    function render() {
      grid.innerHTML = '';

      state.forEach(item => {
        const card = createCard(item);

        if (item.isOpen) {
          card.classList.remove('closed');
          card.classList.add('revealed');
        } else {
          card.classList.add('closed');
          card.classList.remove('revealed');
        }

        if (item.wasOpened) {
          card.classList.add('opened');
        }

        grid.appendChild(card);
      });
    }

    function toggleCard(id) {
      const item = state.find(card => card.id === id);
      if (!item) return;

      item.isOpen = !item.isOpen;
      if (item.isOpen) {
        item.wasOpened = true;
        openModal(getImagePath(item.id), item.id);
      } else {
        closeModal();
      }
      render();
    }

    closeModalBtn.addEventListener('click', closeModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    render();
  </script>
</body>
</html>
